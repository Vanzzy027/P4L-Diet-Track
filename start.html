<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/style.css"> 
    
    <!-- External Libraries -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    
    <title>P4L Start</title>
</head>
<body>

<!-- Note: Since this file contains the modal content directly, 
     if you are using the modal overlay strategy, this file is generally retired. 
     The #startModal below will appear as the main page content here. -->

<header class="main-header">
    <h1>Profile Setup</h1>
</header>  

<!-- Modal Content (Main Content for this page) -->
<div id="startModal" class="modal-overlay" style="position: relative; display: block;">
    <div class="modal-content">
        <!-- Close button removed here as it is the main page, but kept in app.js for modal use -->
        
        <div class="grid-x grid-padding-x align-center" style="max-width: 800px;">
            <div class="cell large-12 text-center">
                <h2 style="margin-bottom: 20px;">Your Calorie Goals</h2>
                <p>Use the form below to set or update your personalized calorie goals.</p>
            </div>

            <form id="profileForm" class="cell large-10 medium-12">
                <label>Gender
                    <select id="userGender" required>
                        <option value="">Select...</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </label>

                <label>Age (years)
                    <input type="number" id="userAge" min="15" max="100" placeholder="e.g., 30" required>
                </label>

                <label>Weight (kg)
                    <input type="number" id="userWeight" min="40" placeholder="e.g., 70" required>
                </label>
                
                <label>Height (cm)
                    <input type="number" id="userHeight" min="100" placeholder="e.g., 175" required>
                </label>
                
                <label>Activity Level
                    <select id="userActivity" required>
                        <option value="">Select your weekly activity...</option>
                        <option value="1.2">Sedentary (little or no exercise)</option>
                        <option value="1.375">Lightly Active (1-3 days/week)</option>
                        <option value="1.55">Moderately Active (3-5 days/week)</option>
                        <option value="1.725">Very Active (6-7 days/week)</option>
                        <option value="1.9">Extremely Active (Daily intense exercise)</option>
                    </select>
                </label>

                <button type="submit" class="button primary expanded" id="calculateBtn">Calculate Goals</button>
            </form>

            <div id="resultsDisplay" class="cell large-10 medium-12 callout success" style="display: none; margin-top: 20px;">
                <h4>Your Daily Goal:</h4>
                <p>BMR: <span id="bmrValue"></span> calories/day</p>
                <p>TDEE: <span id="tdeeValue"></span> calories/day</p>
            </div>
        </div>
    </div>
</div>
