<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Modal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/contact.css"> 
    
    <script>
        // Function to open the modal
        function openModal() {
            document.getElementById('contactModal').style.display = 'flex';
        }
        
        /// Function to close the modal
        function closeModal() {
            document.getElementById('contactModal').style.display = 'none';
            window.history.back();     // This command tells the browser to go back to the previous page in its history
        }
        

        // AUTO-OPEN LOGIC: Execute openModal() once the page finishes loading
        window.onload = function() {
            openModal();
        };
    </script>

</head>
<body>

<div id="contactModal" class="modal-overlay" onclick="closeModal()">
    
    <div class="modal-content" onclick="event.stopPropagation()">
        
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <div class="contact-form-container">
            
            <center><p class="contact-title">Contact Us</p></center>

            <form action="mailto:vanzzyspinet@gmail.com" method="post" enctype="text/plain">
                
                <div class="name-group">
                    <div>
                        <label>First Name <span class="imp">*</span></label>
                        <input type="text" name="fname" required="required">
                    </div>
                    <div>
                        <label>Last Name <span class="imp">*</span></label>
                        <input type="text" name="lname" required="required">
                    </div>
                </div>

                <label>Email <span class="imp">*</span></label>
                <input type="email" name="mail" required="required"><br>
                
                <label>Message <span class="imp">*</span></label>
                <input type="text" name="message" required="required"><br>
                
                <label>Additional Details</label>
                <textarea name="addtional"></textarea><br>
                
                <button type="submit" id="csubmit" onclick="setTimeout(closeModal, 100);">Send Message</button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
